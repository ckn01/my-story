<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desain Database PNFI</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#f5f3ef;--fg:#1a1a1a;--muted:#7a7568;--border:#d8d4cb;--accent:#c2550a;--accent-light:rgba(194,85,10,.08);--auth:#1a6fc4;--auth-bg:#e8f0fa;--ref:#0d7c5f;--ref-bg:#e6f5ef;--dbo:#b85c00;--dbo-bg:#fdf2e3;--log:#7c3aed;--log-bg:#f0ebfa;--trx:#c41e1e;--trx-bg:#fceaea;--rekap:#0e7490;--rekap-bg:#e6f5fa;--card:#fff;--shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);--shadow-h:0 2px 8px rgba(0,0,0,.08),0 8px 28px rgba(0,0,0,.06);--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--fg);overflow:hidden;height:100vh;width:100vw;user-select:none}
.pres{width:100vw;height:100vh;position:relative;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;transform:translateX(60px);transition:opacity .45s,transform .45s;pointer-events:none;padding:44px 60px;overflow-y:auto}
.slide.on{opacity:1;transform:translateX(0);pointer-events:auto}
.slide.off{opacity:0;transform:translateX(-60px)}
.slide::-webkit-scrollbar{width:5px}.slide::-webkit-scrollbar-thumb{background:var(--border);border-radius:9px}
.pbar{position:fixed;top:0;left:0;height:3px;background:var(--accent);z-index:100;transition:width .4s}
.nnav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:14px;z-index:100;background:var(--card);box-shadow:var(--shadow);padding:10px 24px;border-radius:40px;border:1px solid var(--border)}
.nb{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--fg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s}
.nb:hover{background:var(--accent);color:#fff;border-color:var(--accent)}.nb:disabled{opacity:.3;cursor:default;background:var(--card);color:var(--muted);border-color:var(--border)}
.sc{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);min-width:66px;text-align:center}
.gn{position:fixed;right:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;z-index:100}
.gd{width:10px;height:10px;border-radius:50%;cursor:pointer;transition:all .3s;border:2px solid transparent;opacity:.5;position:relative}
.gd:hover{transform:scale(1.5);opacity:.8}.gd.on{border-color:var(--fg);transform:scale(1.4);opacity:1}
.gd .tt{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);padding:4px 10px;border-radius:6px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;color:var(--fg)}
.gd:hover .tt{opacity:1}
.cc{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative}
.cb{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--accent);background:var(--accent-light);border:1px solid rgba(194,85,10,.18);padding:6px 20px;border-radius:20px;margin-bottom:32px}
.ct{font-size:52px;font-weight:700;line-height:1.12;margin-bottom:14px}.ct b{background:linear-gradient(135deg,var(--accent),#e07830);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
.cs{font-size:17px;color:var(--muted);font-weight:300;margin-bottom:36px}
.cm{display:flex;gap:20px;font-size:12px;color:var(--muted);flex-wrap:wrap;justify-content:center}.cm span i{margin-right:5px}
.cdeco{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(194,85,10,.04) 0%,transparent 65%);pointer-events:none}
.og{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-top:18px}
.sk{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 14px;position:relative;overflow:hidden;cursor:pointer;transition:all .25s;box-shadow:var(--shadow)}
.sk:hover{transform:translateY(-3px);box-shadow:var(--shadow-h)}
.sk .si{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:10px}
.sk .sn{font-weight:600;font-size:13px;margin-bottom:3px}.sk .sd{font-size:10px;color:var(--muted);margin-bottom:8px;line-height:1.4}
.sk .sv{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700}.sk .sv small{font-size:10px;font-weight:400;color:var(--muted)}
.sk::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sr{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:16px}
.st{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;box-shadow:var(--shadow)}
.stv{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:var(--accent)}.stl{font-size:11px;color:var(--muted);margin-top:2px}
.gh{display:flex;flex-direction:column;justify-content:center;flex:1}
.ggb{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px}
.ggt{font-size:36px;font-weight:700;margin-bottom:10px}
.ggd{font-size:14px;color:var(--muted);max-width:640px;line-height:1.6;margin-bottom:16px}
.ggn{display:inline-flex;align-items:center;gap:8px;font-size:12px;padding:7px 14px;border-radius:8px;margin-bottom:16px}
.ggn i{font-size:13px}
.ggsub{font-size:13px;font-weight:600;margin-bottom:8px;margin-top:4px}
.ggtc{display:flex;flex-wrap:wrap;gap:7px}
.tc{font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 12px;border-radius:8px;border:1px solid}
.tdh{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.tdd{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.tdn{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:600}
.tdc{font-size:12px;color:var(--muted);margin-left:auto;font-family:'JetBrains Mono',monospace}
.tds{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:12px;padding-left:24px}
.ab{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--accent-light);color:var(--accent);letter-spacing:.5px;margin-left:5px}
.af{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--auth-bg);color:var(--auth);letter-spacing:.5px;margin-left:4px}
.agbadge{font-size:10px;color:#fff;padding:2px 8px;border-radius:4px;margin-left:8px;font-weight:600}
.ctb{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
.ctb thead th{text-align:left;padding:8px 14px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:2px solid var(--border);position:sticky;top:0;background:var(--card);z-index:2}
.ctb tbody td{padding:6px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.ctb tbody tr{transition:background .15s}.ctb tbody tr:hover{background:var(--accent-light)}
.cn{font-family:'JetBrains Mono',monospace;font-weight:500;color:var(--fg);font-size:12px}
.ct{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.rg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.rc{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:12px;box-shadow:var(--shadow)}
.rc .rn{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--accent);margin-bottom:5px;font-size:11px}
.rc .rb{color:var(--muted);line-height:1.5;font-family:'JetBrains Mono',monospace;font-size:11px}
.po{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.35;background-image:radial-gradient(circle at 1px 1px,rgba(0,0,0,.04) 1px,transparent 0);background-size:28px 28px}
.sh{position:fixed;bottom:80px;right:16px;font-size:10px;color:var(--muted);text-align:right;z-index:100;line-height:1.8;font-family:'JetBrains Mono',monospace}
.sh kbd{background:var(--card);border:1px solid var(--border);padding:1px 6px;border-radius:4px;font-size:10px}
@media(max-width:1024px){.slide{padding:24px 28px}.ct{font-size:32px}.og{grid-template-columns:repeat(3,1fr)}.sr{grid-template-columns:repeat(3,1fr)}.rg{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

// =============================================
// FUNGSI HELPER

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderRows(cols) {
  var h = '';
  for (var i = 0; i < cols.length; i++) {
    var c = cols[i];
    var b = '';
    if (c[2] === 1) b += '<span class="ab">PK</span>';
    if (c[3] === 1) b += '<span class="af">FK</span>';
    h += '<tr><td><span class="cn">' + esc(c[0]) + '</span>' + b + '</td><td><span class="ct">' + esc(c[1]) + '</span></td></tr>';
  }
  return h;
}

function getTablesBySchema(schemaKey) {
  var arr = [];
  for (var k in T) { if (T[k].schema === schemaKey) arr.push(T[k]); }
  return arr;
}

// Relasi slide
var fkMap = {};
for (var fk in T) {
  var ft = T[fk];
  for (var fkr in ft.fks) {
    if (!fkMap[ft.fks[fkr]]) fkMap[ft.fks[fkr]] = [];
    fkMap[ft.fks[fkr]].push({from: ft.label, col: fkr});
  }
}
var relCards = '';
var rki = 0;
for (var rkt in fkMap) {
  if (rki >= 24) break;
  var rkes = fkMap[rkt];
  var rlines = '';
  for (var rli = 0; rli < rkes.length; rli++) {
    rlines += '<span style="color:var(--fg)">' + esc(rkes[rli].from) + '</span>.' + esc(rkes[rli].col) + '<br>';
  }
  relCards += '<div class="rc"><div class="rn"><i class="fas fa-arrow-right" style="margin-right:4px"></i>' + esc(rkt) + '</div><div class="rb">' + rlines + '<span style="color:var(--muted);font-size:10px">' + rkes.length + ' referensi</span></div></div>';
  rki++;
}
var fkTotal = 0;
for (var fkt in fkMap) fkTotal += fkMap[fkt].length;
var relExtra = fkTotal > 24 ? '<div style="text-align:center;margin-top:10px;color:var(--muted);font-size:12px">dan ' + (fkTotal - 24) + ' relasi lainnya...</div>' : '';
slides.push({g:'relations', h:'<div style="margin-bottom:6px;font-family:JetBrains Mono,monospace;font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase">Foreign Key Map</div><h2 style="font-size:28px;font-weight:700;margin-bottom:4px">Peta Relasi Antar Tabel</h2><p style="color:var(--muted);font-size:13px;margin-bottom:14px">Tabel yang menjadi rujukan foreign key (' + fkTotal + ' total relasi)</p><div class="rg">' + relCards + '</div>' + relExtra});

// Penutup
slides.push({g:'end', h:'<div class="cc"><div class="cdeco"></div><div class="cb">End of Presentation</div><h1 class="ct" style="font-size:40px">Desain Database <b>PNFI</b></h1><p class="cs">6 Skema &middot; ' + totalTbl + ' Tabel &middot; ' + totalCol + ' Kolom &middot; ' + fkTotal + ' Foreign Key</p><div class="cm"><span><i class="fas fa-shield-halved" style="color:#1a6fc4"></i> Auth</span><span><i class="fas fa-book" style="color:#0d7c5f"></i> Referensi</span><span><i class="fas fa-database" style="color:#b85c00"></i> Master</span><span><i class="fas fa-clock-rotate-left" style="color:#7c3aed"></i> Log</span><span><i class="fas fa-right-left" style="color:#c41e1e"></i> Transaksi</span><span><i class="fas fa-arrow-down-to-line" style="color:#0e7490"></i> Rekap</span></div></div>'});

// =============================================
// RENDER & NAVIGASI
// =============================================
var pr = document.getElementById('pr');
for (var ri2 = 0; ri2 < slides.length; ri2++) {
  var div = document.createElement('div');
  div.className = 'slide' + (ri2 === 0 ? ' on' : '');
  div.innerHTML = slides[ri2].h;
  pr.appendChild(div);
}

function goTo(idx) {
  if (idx < 0 || idx >= slides.length || idx === cur) return;
  var old = pr.children[cur];
  var nw = pr.children[idx];
  old.className = idx > cur ? 'slide off' : 'slide';
  nw.className = 'slide on';
  nw.scrollTop = 0;
  cur = idx;
  updUI();
}
function updUI() {
  document.getElementById('sct').textContent = (cur + 1) + '/' + slides.length;
  document.getElementById('pb').style.width = ((cur + 1) / slides.length * 100) + '%';
  document.getElementById('bp').disabled = cur === 0;
  document.getElementById('bf').disabled = cur === 0;
  document.getElementById('bn').disabled = cur === slides.length - 1;
  document.getElementById('bl').disabled = cur === slides.length - 1;
  var dots = document.querySelectorAll('.gd');
  for (var di = 0; di < dots.length; di++) {
    dots[di].classList.toggle('on', dots[di].dataset.g === slides[cur].g);
  }
}
function goG(gk) { if (gStart[gk] !== undefined) goTo(gStart[gk]); }

document.getElementById('bp').onclick = function() { goTo(cur - 1); };
document.getElementById('bn').onclick = function() { goTo(cur + 1); };
document.getElementById('bf').onclick = function() { goTo(0); };
document.getElementById('bl').onclick = function() { goTo(slides.length - 1); };

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); goTo(cur + 1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goTo(cur - 1); }
  if (e.key === 'Home') { e.preventDefault(); goTo(0); }
  if (e.key === 'End') { e.preventDefault(); goTo(slides.length - 1); }
});

var tsx = 0;
document.addEventListener('touchstart', function(e) { tsx = e.touches[0].clientX; });
document.addEventListener('touchend', function(e) { var d = tsx - e.changedTouches[0].clientX; if (Math.abs(d) > 60) { d > 0 ? goTo(cur + 1) : goTo(cur - 1); }});

// Group dots
var gColors = {cover:'#c2550a',overview:'#c2550a',auth:'#1a6fc4',ref:'#0d7c5f',dbo:'#b85c00',log:'#7c3aed',transaksi:'#c41e1e',rekap:'#0e7490',relations:'#c2550a',end:'#c2550a'};
var gLabels = {cover:'Cover',overview:'Overview',auth:'Auth',ref:'Referensi',dbo:'Master Data',log:'Logging',transaksi:'Transaksi',rekap:'Rekap Eksternal',relations:'Relasi',end:'Penutup'};
var gnv = document.getElementById('gnv');
for (var gk in gColors) {
  var dot = document.createElement('div');
  dot.className = 'gd' + (slides[0].g === gk ? ' on' : '');
  dot.dataset.g = gk;
  dot.style.background = gColors[gk];
  dot.innerHTML = '<span class="tt">' + gLabels[gk] + '</span>';
  dot.onclick = (function(g) { return function() { for (var fi = 0; fi < slides.length; fi++) { if (slides[fi].g === g) { goTo(fi); break; } }}; })(gk);
  gnv.appendChild(dot);
}

// Particles
var cv = document.getElementById('cv');
var cx = cv.getContext('2d');
var pts = [];
function rsz() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
rsz();
window.addEventListener('resize', rsz);
for (var pi = 0; pi < 25; pi++) {
  pts.push({x:Math.random()*cv.width, y:Math.random()*cv.height, vx:(Math.random()-.5)*.2, vy:(Math.random()-.5)*.2, r:Math.random()*1.5+.5, a:Math.random()*.3+.1});
}
function anim() {
  cx.clearRect(0, 0, cv.width, cv.height);
  for (var i = 0; i < pts.length; i++) {
    var p = pts[i];
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = cv.width; if (p.x > cv.width) p.x = 0;
    if (p.y < 0) p.y = cv.height; if (p.y > cv.height) p.y = 0;
    cx.beginPath();
    cx.arc(p.x, p.y, Math.max(0.5, p.r), 0, Math.PI * 2);
    cx.fillStyle = 'rgba(194,85,10,' + p.a + ')';
    cx.fill();
  }
  for (var i2 = 0; i2 < pts.length; i2++) {
    for (var j = i2 + 1; j < pts.length; j++) {
      var dx = pts[i2].x - pts[j].x, dy = pts[i2].y - pts[j].y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 100) {
        cx.beginPath();
        cx.moveTo(pts[i2].x, pts[i2].y);
        cx.lineTo(pts[j].x, pts[j].y);
        cx.strokeStyle = 'rgba(194,85,10,' + (0.05 * (1 - dist / 100)) + ')';
        cx.lineWidth = 0.5;
        cx.stroke();
      }
    }
  }
  requestAnimationFrame(anim);
}
if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) anim();

updUI();
</script>
